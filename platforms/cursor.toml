id = "cursor"
display_name = "Cursor"

[skill]
supported = true
build_path = "skills/{skill_name}"
install_root_env = "CURSOR_SKILLS_DIR"
install_root_default = "~/.cursor/skills"
install_path_suffix = "{skill_name}"

[mcp]
supported = true
scope = "project"
format = "json_map"
root_key = "mcpServers"
build_path = ".cursor/mcp.json"
install_path_env = "CURSOR_MCP_CONFIG_PATH"
install_path_default = "{repo_path}/.cursor/mcp.json"

[manifest]
supported = true
build_path = ".decisionops/manifest.toml"

[auth]
mode = "browser_oauth"
instructions = [
  "Open Cursor Settings → Tools & MCP and verify `{mcp_server_name}` is enabled.",
  "Invoke any Decision Ops MCP tool to trigger the browser OAuth flow; approve the consent screen at auth.aidecisionops.com.",
  "If a stale token blocks login: open Command Palette (Cmd/Ctrl+Shift+P) → `Clear All MCP Tokens`, then toggle `{mcp_server_name}` off and back on. Cursor has no per-server clear yet (forum request open).",
]
