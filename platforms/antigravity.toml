id = "antigravity"
display_name = "Antigravity"

[skill]
supported = true
build_path = "skills/{skill_name}"
install_root_env = "ANTIGRAVITY_SKILLS_DIR"
install_root_default = "~/.antigravity/skills"
install_path_suffix = "{skill_name}"

[mcp]
supported = true
scope = "user"
format = "json_map"
root_key = "mcpServers"
build_path = "mcpServers.json"
install_path_env = "ANTIGRAVITY_MCP_CONFIG_PATH"

[manifest]
supported = true
build_path = ".decisionops/manifest.toml"

[auth]
mode = "browser_oauth"
instructions = [
  "Open {display_name} → Agent panel → MCP Store and confirm `{mcp_server_name}` is enabled.",
  "Invoke any Decision Ops MCP tool in chat; Antigravity will open a browser for OAuth the first time.",
  "To reset a stale session, toggle `{mcp_server_name}` off and back on in the MCP Store (no CLI trigger exists).",
  "Known limitation: Antigravity does not fully implement the MCP OAuth 2.1 / RFC 9728 spec; servers that require dynamic client registration may not auth.",
]

[[auth.triggers]]
kind = "manual"
reason = "primary"
label = "Toggle server in MCP Store"
hint = "Open Antigravity → Agent panel → MCP Store, ensure `{mcp_server_name}` is enabled, then invoke any Decision Ops tool in chat to surface the browser OAuth prompt. Antigravity has no CLI or palette trigger; see also RFC 9728 limitations on Antigravity's side."

[[auth.triggers]]
kind = "manual"
reason = "reset"
label = "Toggle off/on"
hint = "Open Antigravity → Agent panel → MCP Store, toggle `{mcp_server_name}` off and back on."
